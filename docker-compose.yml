services:
  api:
    build:
      context: ./backend
      dockerfile: Api/Dockerfile
    container_name: auth_api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Jwt__Key: ${JWT_KEY}
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=authdb;User=authuser;Password=authpass;"
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS}
      Frontend__BaseUrl: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  db:
    image: mysql:8.0
    container_name: auth_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_USER: authuser
      MYSQL_PASSWORD: authpass
      MYSQL_DATABASE: authdb
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-prootpass",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  db-data:
